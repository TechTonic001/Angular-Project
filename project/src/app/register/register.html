<div class="auth-wrapper">
    <div class="auth-card">
        <a routerLink="/" class="logo">TECH<span>FIT</span></a>
        <h2>Create Account</h2>
        <p>Join the community and start your transformation.</p>

        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
            <div class="form-group">
                <label>Username</label>
                <input type="text" formControlName="username" placeholder="Enter username">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" formControlName="email" placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" formControlName="password" placeholder="Min. 6 characters">
            </div>

            <button type="submit" [disabled]="registerForm.invalid" class="btn-auth">Register</button>
        </form>

        <p class="switch-auth">
            Already have an account? <a routerLink="/login">Log In</a>
        </p>
    </div>
</div>
