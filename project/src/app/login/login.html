<div class="auth-wrapper">
    <div class="auth-card">
        <a routerLink="/" class="logo">TECH<span>FIT</span></a>
        <h2>Welcome Back</h2>
        <p>Log in to access your training data.</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" formControlName="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" formControlName="password" placeholder="Enter your password">
            </div>

            <button type="submit" [disabled]="loginForm.invalid" class="btn-auth">Log In</button>
        </form>

        <p class="switch-auth">
            New to Tech Fit? <a routerLink="/register">Create Account</a>
        </p>
    </div>
</div>
